name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g. v1.85.0)"
        required: true
        type: string
      commit:
        description: "Commit SHA to tag (defaults to HEAD if empty)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Tag and Release
    runs-on: ubuntu-22.04
    steps:
      - name: Validate version format
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! printf '%s' "${VERSION}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version '${VERSION}'. Must match vMAJOR.MINOR.PATCH (e.g. v1.85.0)"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve commit
        id: resolve
        shell: bash
        env:
          INPUT_COMMIT: ${{ inputs.commit }}
        run: |
          set -euo pipefail
          if [ -z "${INPUT_COMMIT}" ]; then
            sha="$(git rev-parse HEAD)"
          else
            sha="$(git rev-parse --verify "${INPUT_COMMIT}^{commit}")" || {
              echo "::error::Commit '${INPUT_COMMIT}' not found in this repository"
              exit 1
            }
          fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Resolved commit: ${sha}"

      - name: Check tag does not already exist
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag '${VERSION}' already exists"
            exit 1
          fi

      - name: Create and push tag
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          git tag "${VERSION}" "${SHA}"
          git push origin "${VERSION}"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ inputs.version }}
          SHA: ${{ steps.resolve.outputs.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.VERSION;
            const sha = process.env.SHA;

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              target_commitish: sha,
              generate_release_notes: true,
            });

            core.info(`Release created: ${release.data.html_url}`);
